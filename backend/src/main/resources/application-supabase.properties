# =====================================================================
# Profil "supabase" – PostgreSQL bei Supabase
# Aktivieren mit:  --spring.profiles.active=supabase
# Zugangsdaten kommen aus Umgebungsvariablen (NICHT committen!):
#   SUPABASE_DB_URL       z. B. jdbc:postgresql://db.<ref>.supabase.co:5432/postgres
#   SUPABASE_DB_USER      meist "postgres"
#   SUPABASE_DB_PASSWORD  Passwort aus dem Supabase-Dashboard
# Voraussetzung: schema.sql + data.sql wurden einmalig im Supabase-SQL-Editor ausgefuehrt.
# =====================================================================

spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# (Dialekt wird von Hibernate automatisch als PostgreSQL erkannt)
# Hibernate erstellt KEINE Tabellen, prueft nur, dass das Schema zu den Entities passt:
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# schema.sql/data.sql NICHT automatisch ausfuehren (liegt bereits in Supabase):
spring.sql.init.mode=never

# H2-Konsole im Supabase-Betrieb aus:
spring.h2.console.enabled=false
