spring.application.name=serviceauftrag

# =====================================================================
# DATENBANK
# ---------------------------------------------------------------------
# Standard (Geruest): eingebettete H2-DB, laeuft ohne weitere Konfig.
# Nuetzlich zum Starten/Testen, bevor Supabase eingerichtet ist.
# H2-Konsole: http://localhost:8080/h2-console
# =====================================================================
spring.datasource.url=jdbc:h2:mem:serviceauftrag
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# eigene schema.sql/data.sql erst aktivieren, wenn sie befuellt sind:
spring.sql.init.mode=never

# =====================================================================
# SPAETER: Supabase (PostgreSQL) -- H2-Block oben auskommentieren und
# diesen aktivieren. Werte aus dem Supabase-Dashboard eintragen.
# =====================================================================
# spring.datasource.url=jdbc:postgresql://<HOST>:5432/postgres
# spring.datasource.username=postgres
# spring.datasource.password=<DEIN_PASSWORT>
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
